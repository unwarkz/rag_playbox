# =============================================================================
# RAG Sandbox - Database Layer Group
# =============================================================================
# Database layer - all storage backends
#
# Services: PostgreSQL, Redis, Qdrant, Neo4j, MinIO
#
# Usage:
#   docker compose -f docker-compose-group-databases.yml up -d
# =============================================================================

include:
  - docker-compose-common.yml
  - docker-compose-postgres.yml
  - docker-compose-redis.yml
  - docker-compose-qdrant.yml
  - docker-compose-neo4j.yml
  - docker-compose-minio.yml
  - docker-compose-mysql.yml
