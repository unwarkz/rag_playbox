###############################################################################
#  docker-compose-ollama.yml — Ollama local LLM inference (CPU-only)
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-ollama.yml up -d
#
#  Image: ollama/ollama:latest
#  Port (internal only): 11434
#  No external port mapping — access via rag-internal network only.
#  Consumers: LightRAG, Mem0, AnythingLLM, Open WebUI, Dify — any
#  service that calls the Ollama API for chat / completion / embeddings.
#
#  CPU-only configuration — no GPU/runtime section. Tune OLLAMA_NUM_PARALLEL
#  and OLLAMA_MAX_LOADED_MODELS to fit within the memory budget.
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: ${DOCKER_STACK_PREFIX}-ollama

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    environment:
      # Port & Host
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0:11434}
      OLLAMA_ORIGINS: ${OLLAMA_ORIGINS:-*}

      # Model Management
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      OLLAMA_LOAD_TIMEOUT: ${OLLAMA_LOAD_TIMEOUT:-5m}
      OLLAMA_NOHISTORY: ${OLLAMA_NOHISTORY:-false}
      OLLAMA_NOPRUNE: ${OLLAMA_NOPRUNE:-false}

      # Performance & Scheduling
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-}
      OLLAMA_GPU_OVERHEAD: ${OLLAMA_GPU_OVERHEAD:-}
      OLLAMA_SCHED_SPREAD: ${OLLAMA_SCHED_SPREAD:-false}

      # Attention & Cache Optimization
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-false}
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-f16}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-}
      OLLAMA_MULTIUSER_CACHE: ${OLLAMA_MULTIUSER_CACHE:-false}

      # Inference Engine
      OLLAMA_LLM_LIBRARY: ${OLLAMA_LLM_LIBRARY:-}
      OLLAMA_NEW_ENGINE: ${OLLAMA_NEW_ENGINE:-false}

      # Cloud & Remote
      OLLAMA_NO_CLOUD: ${OLLAMA_NO_CLOUD:-false}
      OLLAMA_REMOTES: ${OLLAMA_REMOTES:-}

      # Debugging
      OLLAMA_DEBUG: ${OLLAMA_DEBUG:-0}
      OLLAMA_DEBUG_LOG_REQUESTS: ${OLLAMA_DEBUG_LOG_REQUESTS:-false}

      # Interactive
      OLLAMA_EDITOR: ${OLLAMA_EDITOR:-}

      # Authentication
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}

      # General
      TZ: ${TZ:-UTC}

    volumes:
      - ollama-data:/root/.ollama

    networks:
      - rag-internal

    # No external port mapping — services reach Ollama via rag-internal
    # API: http://ollama:11434

    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    cpus: ${OLLAMA_CPU_LIMIT:-4.0}
    mem_limit: ${OLLAMA_MEM_LIMIT:-3072m}
