###############################################################################
#  docker-compose-nocodb.yml — NocoDB (Airtable alternative)
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-postgres.yml \
#                   -f docker-compose-redis.yml \
#                   -f docker-compose-nocodb.yml up -d
#
#  Image: nocodb/nocodb:latest
#  No external port mapping — access via rag-frontend + NPM only.
#  Storage backends:
#    Metadata  → PostgreSQL (nocodb database)
#    Cache     → Redis (db:6)
#    Files     → local volume (nocodb-data)
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  nocodb:
    image: ${NOCODB_IMAGE:-nocodb/nocodb:latest}
    container_name: ${DOCKER_STACK_PREFIX}-nocodb

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    environment:
      # --- PostgreSQL connection (nocodb database) ---
      NC_DB: ${NC_DB:-pg://postgres:5432?u=nocodb&p=Ch4ng3me_N0c0DB_db!&d=nocodb}
      # --- Authentication ---
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET:-Ch4ng3me_N0coDB_JWT!}
      # --- Redis cache (db:6) ---
      NC_REDIS_URL: ${NC_REDIS_URL:-redis://nocodb:Ch4ng3me_N0c0DB_redis!@redis:6379/6}
      # --- Disable telemetry ---
      NC_DISABLE_TELE: "${NC_DISABLE_TELE:-true}"
      TZ: ${TZ:-UTC}

    volumes:
      - nocodb-data:/usr/app/data

    networks:
      # Internal: reaches postgres, redis
      - ${DOCKER_STACK_PREFIX}-rag-internal
      # Frontend: exposed via Nginx Proxy Manager
      - ${DOCKER_STACK_PREFIX}-rag-frontend

    # No external port mapping — access via rag-frontend + NPM only
    # WebUI: http://nocodb:8080

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8080/api/v1/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    cpus: ${NOCODB_CPU_LIMIT:-0.5}
    mem_limit: ${NOCODB_MEM_LIMIT:-256m}
