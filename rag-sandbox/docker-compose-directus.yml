###############################################################################
#  docker-compose-directus.yml — Directus headless CMS
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-postgres.yml \
#                   -f docker-compose-redis.yml \
#                   -f docker-compose-minio.yml \
#                   -f docker-compose-directus.yml up -d
#
#  Image: directus/directus:11.16
#  No external port mapping — access via rag-frontend + NPM only.
#  Storage backends:
#    Metadata  → PostgreSQL (directus database)
#    Cache     → Redis (db:3)
#    Files     → MinIO (S3-compatible) + local uploads volume
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  directus:
    image: ${DIRECTUS_IMAGE:-directus/directus:11.16}
    container_name: rag-directus

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    environment:
      # --- Secret key for token signing ---
      SECRET: ${DIRECTUS_SECRET:-Ch4ng3me_D1rectus_Secret_Random!}
      KEY: ${DIRECTUS_KEY:-Ch4ng3me_D1rectus_Key_Random!}

      # --- PostgreSQL connection (directus database) ---
      DB_CLIENT: ${DIRECTUS_DB_CLIENT:-pg}
      DB_HOST: ${DIRECTUS_DB_HOST:-postgres}
      DB_PORT: ${DIRECTUS_DB_PORT:-5432}
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-ragadmin}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-Ch4ng3me_P0stgres!}

      # --- Cache via Redis (db:3) ---
      CACHE_ENABLED: ${DIRECTUS_CACHE_ENABLED:-true}
      CACHE_STORE: ${DIRECTUS_CACHE_STORE:-redis}
      REDIS: ${DIRECTUS_REDIS:-redis://:Ch4ng3me_R3dis!@redis:6379/3}

      # --- S3 file storage via MinIO ---
      STORAGE_LOCATIONS: ${DIRECTUS_STORAGE_LOCATIONS:-s3}
      STORAGE_S3_DRIVER: ${DIRECTUS_STORAGE_S3_DRIVER:-s3}
      STORAGE_S3_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET: ${MINIO_ROOT_PASSWORD:-Ch4ng3me_Min10!}
      STORAGE_S3_BUCKET: ${MINIO_DEFAULT_BUCKET:-rag-documents}
      STORAGE_S3_REGION: ${DIRECTUS_STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ENDPOINT: http://minio:${MINIO_API_PORT:-9000}
      STORAGE_S3_FORCE_PATH_STYLE: "${DIRECTUS_STORAGE_S3_FORCE_PATH_STYLE:-true}"

      # --- Admin credentials (first-run bootstrap) ---
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-Ch4ng3me_D1rectus_Admin!}

      # --- Email / SMTP (placeholder — configure for production) ---
      EMAIL_FROM: ${SMTP_FROM:-admin@example.com}
      EMAIL_TRANSPORT: ${DIRECTUS_EMAIL_TRANSPORT:-smtp}
      EMAIL_SMTP_HOST: ${SMTP_HOST:-}
      EMAIL_SMTP_PORT: "${SMTP_PORT:-587}"

      # --- Public URL for CORS / link generation ---
      PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:8027}

      TZ: ${TZ:-UTC}

    volumes:
      - directus-uploads:/directus/uploads

    networks:
      # Internal: reaches postgres, redis, minio
      - rag-internal
      # Frontend: exposed via Nginx Proxy Manager
      - rag-frontend

    # No external port mapping — access via rag-frontend + NPM only
    # WebUI: http://directus:8055

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8055/server/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    cpus: ${DIRECTUS_CPU_LIMIT:-0.5}
    mem_limit: ${DIRECTUS_MEM_LIMIT:-384m}
