###############################################################################
#  docker-compose-minio.yml — MinIO S3-compatible object storage
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-minio.yml up -d
#
#  Image: pgsty/minio:latest
#  Ports (internal): 9000 (S3 API), 9001 (Console WebUI)
#  No external port mapping — S3 API via rag-internal, Console via NPM.
#  Consumers: Dify, RAGFlow, document upload pipelines.
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  minio:
    image: ${MINIO_IMAGE:-pgsty/minio:latest}
    container_name: ${DOCKER_STACK_PREFIX}-minio

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    # -------------------------------------------------------------------------
    # Start MinIO server with console on a separate port:
    #   - /data is the storage root (backed by minio-data volume)
    #   - --console-address binds the WebUI to :9001
    # -------------------------------------------------------------------------
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-Ch4ng3me_Min10!}

    volumes:
      - minio-data:/data

    networks:
      # S3 API (port 9000) — reachable by all backend services
      - ${DOCKER_STACK_PREFIX}-rag-internal
      # Console WebUI (port 9001) — accessible via Nginx Proxy Manager
      - ${DOCKER_STACK_PREFIX}-rag-frontend

    # No external port mapping — Console is exposed through NPM
    # S3 API:  http://minio:9000   Console: http://minio:9001

    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

    cpus: ${MINIO_CPU_LIMIT:-0.5}
    mem_limit: ${MINIO_MEM_LIMIT:-256m}
 