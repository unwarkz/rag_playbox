###############################################################################
#  docker-compose-postgres.yml — PostgreSQL 18 + pgvector
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-postgres.yml up -d
#
#  Base image: pgvector/pgvector:pg18 (custom build for locale support)
#  Extensions: pgvector, pg_trgm, unaccent, uuid-ossp (installed per-db)
#  No external port mapping — access via rag-internal network only.
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  postgres:
    <<: *common
    build:
      context: ./postgres
      dockerfile: Dockerfile
      args:
        PG_BASE: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18}
        POSTGRES_LOCALE: ${POSTGRES_LOCALE:-ru_RU.UTF-8}
    container_name: ${DOCKER_STACK_PREFIX}-postgres
    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}
    command: postgres -c maintenance_work_mem=512MB -c shared_buffers=512MB -c max_connections=200

    environment:
      # --- PostgreSQL Server Configuration ---
      POSTGRES_USER: ${POSTGRES_USER:-ragadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---locale=ru_RU.UTF-8 --encoding=UTF8}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}

      # --- LIBPQ Connection Environment Variables ---
      # Connection Parameters
      PGHOST: ${PGHOST:-localhost}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-${POSTGRES_DB:-ragdb}}
      PGUSER: ${PGUSER:-${POSTGRES_USER:-ragadmin}}
      PGPASSWORD: ${PGPASSWORD:-${POSTGRES_PASSWORD}}
      PGPASSFILE: ${PGPASSFILE:-}
      PGSERVICE: ${PGSERVICE:-}
      PGSERVICEFILE: ${PGSERVICEFILE:-}
      PGOPTIONS: ${PGOPTIONS:-}
      PGAPPNAME: ${PGAPPNAME:-rag-postgres}
      PGCONNECT_TIMEOUT: ${PGCONNECT_TIMEOUT:-10}

      # Client Encoding & Session Behavior
      PGCLIENTENCODING: ${PGCLIENTENCODING:-UTF8}
      PGDATESTYLE: ${PGDATESTYLE:-ISO,MDY}
      PGGEQO: ${PGGEQO:-on}

      # SSL/TLS Configuration
      PGSSLMODE: ${PGSSLMODE:-prefer}
      PGSSLCOMPRESSION: ${PGSSLCOMPRESSION:-0}
      PGSSLCERT: ${PGSSLCERT:-}
      PGSSLKEY: ${PGSSLKEY:-}
      PGSSLROOTCERT: ${PGSSLROOTCERT:-}
      PGSSLCRL: ${PGSSLCRL:-}
      PGSSLCRLDIR: ${PGSSLCRLDIR:-}
      PGSSLSNI: ${PGSSLSNI:-1}
      PGSSLNEGOTIATION: ${PGSSLNEGOTIATION:-postgres}
      PGSSLMINPROTOCOLVERSION: ${PGSSLMINPROTOCOLVERSION:-TLSv1.2}
      PGSSLMAXPROTOCOLVERSION: ${PGSSLMAXPROTOCOLVERSION:-}
      PGSSLCERTMODE: ${PGSSLCERTMODE:-disable}
      PGREQUIRESSL: ${PGREQUIRESSL:-0}

      # GSS/Kerberos Configuration
      PGGSSENCMODE: ${PGGSSENCMODE:-prefer}
      PGKRBSRVNAME: ${PGKRBSRVNAME:-postgres}
      PGGSSLIB: ${PGGSSLIB:-auto}
      PGGSSDELEGATION: ${PGGSSDELEGATION:-0}

      # Advanced Connection
      PGTARGETSESSIONATTRS: ${PGTARGETSESSIONATTRS:-any}
      PGLOADBALANCEHOSTS: ${PGLOADBALANCEHOSTS:-0}
      PGMINPROTOCOLVERSION: ${PGMINPROTOCOLVERSION:-}
      PGMAXPROTOCOLVERSION: ${PGMAXPROTOCOLVERSION:-}
      PGCHANNELBINDING: ${PGCHANNELBINDING:-disable}
      PGREQUIREAUTH: ${PGREQUIREAUTH:-}
      PGREQUIREPEER: ${PGREQUIREPEER:-}

      # System Configuration
      PGLOCALEDIR: ${PGLOCALEDIR:-}
      PGSYSCONFDIR: ${PGSYSCONFDIR:-}

      # Per-service DB users — passed to the init script
      RAGFLOW_DB_USER: ${RAGFLOW_DB_USER:-ragflow}
      RAGFLOW_DB_PASSWORD: ${RAGFLOW_DB_PASSWORD:-Ch4ng3me_R4gfl0w_db!}
      DIFY_DB_USER: ${DIFY_DB_USER:-dify}
      DIFY_DB_PASSWORD: ${DIFY_DB_PASSWORD:-Ch4ng3me_D1fy_db!}
      OPENWEBUI_DB_USER: ${OPENWEBUI_DB_USER:-openwebui}
      OPENWEBUI_DB_PASSWORD: ${OPENWEBUI_DB_PASSWORD:-Ch4ng3me_0p3nWU_db!}
      LIGHTRAG_DB_USER: ${LIGHTRAG_DB_USER:-lightrag}
      LIGHTRAG_DB_PASSWORD: ${LIGHTRAG_DB_PASSWORD:-Ch4ng3me_L1ghtRAG_db!}
      MEM0_DB_USER: ${MEM0_DB_USER:-mem0}
      MEM0_DB_PASSWORD: ${MEM0_DB_PASSWORD:-Ch4ng3me_M3m0_db!}
      HINDSIGHT_DB_USER: ${HINDSIGHT_DB_USER:-hindsight}
      HINDSIGHT_DB_PASSWORD: ${HINDSIGHT_DB_PASSWORD:-Ch4ng3me_H1nds1ght_db!}
      DIRECTUS_DB_USER: ${DIRECTUS_DB_USER:-directus}
      DIRECTUS_DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-Ch4ng3me_D1rectus_db!}
      NOCODB_DB_USER: ${NOCODB_DB_USER:-nocodb}
      NOCODB_DB_PASSWORD: ${NOCODB_DB_PASSWORD:-Ch4ng3me_N0c0DB_db!}
      TEABLE_DB_USER: ${TEABLE_DB_USER:-teable}
      TEABLE_DB_PASSWORD: ${TEABLE_DB_PASSWORD:-Ch4ng3me_T3able_db!}
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER:-langfuse}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD:-Ch4ng3me_L4ngfuse_db!}
      LITELLM_DB_USER: ${LITELLM_DB_USER:-litellm}
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD:-Ch4ng3me_L1teLLM_db!}

    volumes:
      - pg-data:/var/lib/postgresql/data

    # -------------------------------------------------------------------------
    # Inline init.sql — creates per-service databases and installs extensions.
    # Written to /docker-entrypoint-initdb.d/ before the stock entrypoint runs.
    # Uses a bash loop to generate SQL for Portainer / single-file compatibility.
    # Runs once on first container start (empty data directory).
    # -------------------------------------------------------------------------
    entrypoint:
      - bash
      - -c
      - |
        EXTENSIONS="vector pg_trgm unaccent \"uuid-ossp\""

        {
          echo "-- init.sql — auto-generated by entrypoint"

          # ── per-service users (each owns their database) ──
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${RAGFLOW_DB_USER}', '${RAGFLOW_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${DIFY_DB_USER}', '${DIFY_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${OPENWEBUI_DB_USER}', '${OPENWEBUI_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${LIGHTRAG_DB_USER}', '${LIGHTRAG_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${MEM0_DB_USER}', '${MEM0_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${HINDSIGHT_DB_USER}', '${HINDSIGHT_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${DIRECTUS_DB_USER}', '${DIRECTUS_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${NOCODB_DB_USER}', '${NOCODB_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${TEABLE_DB_USER}', '${TEABLE_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${LANGFUSE_DB_USER}', '${LANGFUSE_DB_PASSWORD}') \gexec"
          echo "SELECT format('CREATE USER %I WITH PASSWORD %L', '${LITELLM_DB_USER}', '${LITELLM_DB_PASSWORD}') \gexec"

          # ── per-service databases (owned by their user) ──
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_RAGFLOW:-ragflow}', '${RAGFLOW_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_DIFY:-dify}', '${DIFY_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_OPENWEBUI:-openwebui}', '${OPENWEBUI_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_LIGHTRAG:-lightrag}', '${LIGHTRAG_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_MEM0:-mem0}', '${MEM0_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_HINDSIGHT:-hindsight}', '${HINDSIGHT_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_DIRECTUS:-directus}', '${DIRECTUS_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_NOCODB:-nocodb}', '${NOCODB_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_TEABLE:-teable}', '${TEABLE_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_LANGFUSE:-langfuse}', '${LANGFUSE_DB_USER}') \gexec"
          echo "SELECT format('CREATE DATABASE %I OWNER %I', '${POSTGRES_DB_LITELLM:-litellm}', '${LITELLM_DB_USER}') \gexec"

          # ── extensions + public schema grant in each service database ──
          for dbinfo in \
            "${POSTGRES_DB_RAGFLOW:-ragflow}/${RAGFLOW_DB_USER}" \
            "${POSTGRES_DB_DIFY:-dify}/${DIFY_DB_USER}" \
            "${POSTGRES_DB_OPENWEBUI:-openwebui}/${OPENWEBUI_DB_USER}" \
            "${POSTGRES_DB_LIGHTRAG:-lightrag}/${LIGHTRAG_DB_USER}" \
            "${POSTGRES_DB_MEM0:-mem0}/${MEM0_DB_USER}" \
            "${POSTGRES_DB_HINDSIGHT:-hindsight}/${HINDSIGHT_DB_USER}" \
            "${POSTGRES_DB_DIRECTUS:-directus}/${DIRECTUS_DB_USER}" \
            "${POSTGRES_DB_NOCODB:-nocodb}/${NOCODB_DB_USER}" \
            "${POSTGRES_DB_TEABLE:-teable}/${TEABLE_DB_USER}" \
            "${POSTGRES_DB_LANGFUSE:-langfuse}/${LANGFUSE_DB_USER}" \
            "${POSTGRES_DB_LITELLM:-litellm}/${LITELLM_DB_USER}"; do
            db="$${dbinfo%%/*}"
            usr="$${dbinfo##*/}"
            db_escaped="$${db//\"/\"\"}"
            usr_escaped="$${usr//\"/\"\"}"
            echo "\\connect \"$${db_escaped}\""
            for ext in ${EXTENSIONS}; do
              echo "CREATE EXTENSION IF NOT EXISTS $${ext};"
            done
            echo "GRANT ALL ON SCHEMA public TO \"$${usr_escaped}\";"
          done
        } > /docker-entrypoint-initdb.d/init.sql

        # Hand off to the official PostgreSQL entrypoint
        exec docker-entrypoint.sh postgres

    networks:
      - rag-internal

    # No external port mapping — services reach Postgres via rag-internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragadmin} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    shm_size: 256mb

    cpus: ${POSTGRES_CPU_LIMIT:-2.0}
    mem_limit: ${POSTGRES_MEM_LIMIT:-1536m}
