###############################################################################
# RAG Sandbox — Minimal Stack (Portainer Self-Contained)
#
# Deploy via Portainer → Stacks → Add stack → Repository.
# This file is fully self-contained: no external Dockerfiles, env_files,
# or config mounts are required.  All environment variables use
# ${VAR:-default} so the stack works out-of-the-box; override values
# through the Portainer "Environment variables" UI.
#
# Services included:
#   postgres, redis, qdrant, minio, embedding, ollama, openwebui,
#   npm-db, nginx-proxy-manager
#
# External ports (via NPM only): 80, 443, 8020
###############################################################################

name: rag-sandbox

# ─── YAML anchors ──────────────────────────────────────────────────────────────
x-restart: &restart
  restart: ${RESTART_POLICY:-unless-stopped}

x-logging: &logging
  logging:
    driver: ${LOG_DRIVER:-json-file}
    options:
      max-size: ${LOG_MAX_SIZE:-50m}
      max-file: ${LOG_MAX_FILE:-3}

x-default-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256m

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  rag-internal:
    driver: bridge
  rag-frontend:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pg-data:
  redis-data:
  qdrant-data:
  minio-data:
  models-cache:
  ollama-data:
  openwebui-data:
  npm-mysql:
  npm-data:
  npm-letsencrypt:

# ═══════════════════════════════════════════════════════════════════════════════
#  Services
# ═══════════════════════════════════════════════════════════════════════════════
services:

  # ─── PostgreSQL (pgvector) ─────────────────────────────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg17}
    container_name: rag-postgres
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Ch4ng3me_P0stgres!}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---locale=ru_RU.UTF-8 --encoding=UTF8}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
    volumes:
      - pg-data:/var/lib/postgresql/data
    entrypoint:
      - bash
      - -c
      - |
        # Install locale support (not present in base pgvector image)
        apt-get update -qq \
          && apt-get install -y --no-install-recommends locales >/dev/null 2>&1 \
          && sed -i '/ru_RU.UTF-8/s/^# //' /etc/locale.gen \
          && locale-gen >/dev/null 2>&1 \
          && rm -rf /var/lib/apt/lists/*

        # Generate init.sql with per-service databases and extensions
        DATABASES="ragflow dify openwebui lightrag mem0 hindsight directus nocodb teable langfuse litellm"
        EXTENSIONS="vector pg_trgm unaccent \"uuid-ossp\""
        {
          echo "-- init.sql — auto-generated by entrypoint"
          for db in $${DATABASES}; do
            echo "CREATE DATABASE $${db};"
          done
          for db in $${DATABASES}; do
            echo "\\connect $${db}"
            for ext in $${EXTENSIONS}; do
              echo "CREATE EXTENSION IF NOT EXISTS $${ext};"
            done
          done
        } > /docker-entrypoint-initdb.d/init.sql

        # Hand off to the official PostgreSQL entrypoint
        exec docker-entrypoint.sh postgres
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragadmin} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-2.0}"
          memory: ${POSTGRES_MEM_LIMIT:-1536m}

  # ─── Redis (Valkey) ───────────────────────────────────────────────────────
  redis:
    image: ${REDIS_IMAGE:-valkey/valkey:9.0.3-alpine}
    container_name: rag-redis
    <<: [*restart, *logging]
    command: >-
      valkey-server
        --requirepass ${REDIS_PASSWORD:-Ch4ng3me_R3dis!}
        --save 60 1
        --maxmemory ${REDIS_MAXMEMORY:-180mb}
        --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    volumes:
      - redis-data:/data
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD:-Ch4ng3me_R3dis!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: ${REDIS_MEM_LIMIT:-256m}

  # ─── Qdrant (vector store) ────────────────────────────────────────────────
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.16.3}
    container_name: rag-qdrant
    <<: [*restart, *logging]
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: "false"
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${QDRANT_CPU_LIMIT:-1.0}"
          memory: ${QDRANT_MEM_LIMIT:-1024m}

  # ─── MinIO (object storage) ───────────────────────────────────────────────
  minio:
    image: ${MINIO_IMAGE:-pgsty/minio:latest}
    container_name: rag-minio
    <<: [*restart, *logging]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-Ch4ng3me_Min10!}
    volumes:
      - minio-data:/data
    networks:
      - rag-internal
      - rag-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${MINIO_CPU_LIMIT:-0.5}"
          memory: ${MINIO_MEM_LIMIT:-256m}

  # ─── Embedding (Infinity) ─────────────────────────────────────────────────
  embedding:
    image: ${INFINITY_IMAGE:-michaelf34/infinity:latest}
    container_name: rag-embedding
    <<: [*restart, *logging]
    command: >-
      v2
        --model-name-or-path ${EMBED_MODEL:-Qwen/Qwen3-Embedding-0.6B}
        --served-model-name ${EMBED_SERVED_NAME:-embed}
        --port 7997
        --device cpu
        --batch-size 32
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_HUB_CACHE: /models
    volumes:
      - models-cache:/models
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7997/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${EMBEDDING_CPU_LIMIT:-2.0}"
          memory: ${EMBEDDING_MEM_LIMIT:-1024m}

  # ─── Ollama (LLM runtime) ─────────────────────────────────────────────────
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: rag-ollama
    <<: [*restart, *logging]
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_ORIGINS: "*"
      OLLAMA_API_TOKEN: ${OLLAMA_API_TOKEN:-}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      TZ: ${TZ:-UTC}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPU_LIMIT:-4.0}"
          memory: ${OLLAMA_MEM_LIMIT:-3072m}

  # ─── Open WebUI ────────────────────────────────────────────────────────────
  openwebui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: rag-openwebui
    <<: [*restart, *logging]
    environment:
      OLLAMA_BASE_URL: ${OPENWEBUI_OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_TOKEN:-}
      OPENAI_API_BASE_URLS: ${OPENWEBUI_OPENAI_API_BASE_URLS:-}
      OPENAI_API_KEYS: ${OPENWEBUI_OPENAI_API_KEYS:-}
      VECTOR_DB: qdrant
      QDRANT_URI: http://qdrant:${QDRANT_REST_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://embedding:${EMBED_PORT:-7997}/v1
      RAG_OPENAI_API_KEY: ${OPENWEBUI_RAG_OPENAI_API_KEY:-none}
      RAG_EMBEDDING_MODEL: ${EMBED_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      RAG_RERANKING_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      DATABASE_URL: ${OPENWEBUI_DB_URL:-postgresql://ragadmin:Ch4ng3me_P0stgres!@postgres:5432/openwebui}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:-Ch4ng3me_0penWebUI!}
      WEBUI_AUTH: ${OPENWEBUI_WEBUI_AUTH:-true}
      ENABLE_SIGNUP: ${OPENWEBUI_ENABLE_SIGNUP:-true}
      SMTP_SERVER: ${OPENWEBUI_SMTP_SERVER:-}
      SMTP_PORT: ${OPENWEBUI_SMTP_PORT:-587}
      SMTP_USERNAME: ${OPENWEBUI_SMTP_USERNAME:-}
      SMTP_PASSWORD: ${OPENWEBUI_SMTP_PASSWORD:-}
      TZ: ${TZ:-UTC}
    volumes:
      - openwebui-data:/app/backend/data
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${OPENWEBUI_CPU_LIMIT:-1.0}"
          memory: ${OPENWEBUI_MEM_LIMIT:-512m}

  # ─── NPM — MariaDB backend ────────────────────────────────────────────────
  npm-db:
    image: ${NPM_DB_IMAGE:-jc21/mariadb-aria:latest}
    container_name: rag-npm-db
    <<: [*restart, *logging]
    environment:
      MYSQL_ROOT_PASSWORD: ${NPM_DB_MYSQL_ROOT_PASSWORD:-Ch4ng3me_NPM_Root!}
      MYSQL_DATABASE: ${NPM_DB_MYSQL_DATABASE:-npm}
      MYSQL_USER: ${NPM_DB_MYSQL_USER:-npm}
      MYSQL_PASSWORD: ${NPM_DB_MYSQL_PASSWORD:-Ch4ng3me_NPM_Mysql!}
      TZ: ${TZ:-UTC}
    volumes:
      - npm-mysql:/var/lib/mysql
    networks:
      - rag-frontend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${NPM_DB_CPU_LIMIT:-0.5}"
          memory: ${NPM_DB_MEM_LIMIT:-256m}

  # ─── NPM — Nginx Proxy Manager ────────────────────────────────────────────
  nginx-proxy-manager:
    image: ${NPM_IMAGE:-jc21/nginx-proxy-manager:latest}
    container_name: rag-npm
    <<: [*restart, *logging]
    environment:
      DB_MYSQL_HOST: npm-db
      DB_MYSQL_PORT: "3306"
      DB_MYSQL_USER: ${NPM_DB_MYSQL_USER:-npm}
      DB_MYSQL_PASSWORD: ${NPM_DB_MYSQL_PASSWORD:-Ch4ng3me_NPM_Mysql!}
      DB_MYSQL_NAME: ${NPM_DB_MYSQL_DATABASE:-npm}
      TZ: ${TZ:-UTC}
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-8020}:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - rag-frontend
    depends_on:
      npm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:81/api/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${NPM_CPU_LIMIT:-0.5}"
          memory: ${NPM_MEM_LIMIT:-256m}
