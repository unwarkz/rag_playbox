###############################################################################
#  Portainer/docker-compose-postgres.yml — PostgreSQL 17 + pgvector
#
#  Portainer-specific version: uses the base image directly (no build context)
#  and installs the locale at container start via entrypoint.
#
#  Usage (Portainer):
#    Include this file instead of ../docker-compose-postgres.yml in any
#    Portainer group/full compose file.
###############################################################################

# =============================================================================
# YAML ANCHOR — shared restart & logging policy
# =============================================================================

x-common: &common
  restart: ${RESTART_POLICY:-unless-stopped}
  logging:
    driver: ${LOG_DRIVER:-json-file}
    options:
      max-size: ${LOG_MAX_SIZE:-50m}
      max-file: ${LOG_MAX_FILE:-3}

# =============================================================================
# SERVICE
# =============================================================================

services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg17}
    container_name: rag-postgres
    <<: *common

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---locale=ru_RU.UTF-8 --encoding=UTF8}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
      # Per-service DB users — passed to the init script
      RAGFLOW_DB_USER: ${RAGFLOW_DB_USER:-ragflow}
      RAGFLOW_DB_PASSWORD: ${RAGFLOW_DB_PASSWORD:-Ch4ng3me_R4gfl0w_db!}
      DIFY_DB_USER: ${DIFY_DB_USER:-dify}
      DIFY_DB_PASSWORD: ${DIFY_DB_PASSWORD:-Ch4ng3me_D1fy_db!}
      OPENWEBUI_DB_USER: ${OPENWEBUI_DB_USER:-openwebui}
      OPENWEBUI_DB_PASSWORD: ${OPENWEBUI_DB_PASSWORD:-Ch4ng3me_0p3nWU_db!}
      LIGHTRAG_DB_USER: ${LIGHTRAG_DB_USER:-lightrag}
      LIGHTRAG_DB_PASSWORD: ${LIGHTRAG_DB_PASSWORD:-Ch4ng3me_L1ghtRAG_db!}
      MEM0_DB_USER: ${MEM0_DB_USER:-mem0}
      MEM0_DB_PASSWORD: ${MEM0_DB_PASSWORD:-Ch4ng3me_M3m0_db!}
      HINDSIGHT_DB_USER: ${HINDSIGHT_DB_USER:-hindsight}
      HINDSIGHT_DB_PASSWORD: ${HINDSIGHT_DB_PASSWORD:-Ch4ng3me_H1nds1ght_db!}
      DIRECTUS_DB_USER: ${DIRECTUS_DB_USER:-directus}
      DIRECTUS_DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-Ch4ng3me_D1rectus_db!}
      NOCODB_DB_USER: ${NOCODB_DB_USER:-nocodb}
      NOCODB_DB_PASSWORD: ${NOCODB_DB_PASSWORD:-Ch4ng3me_N0c0DB_db!}
      TEABLE_DB_USER: ${TEABLE_DB_USER:-teable}
      TEABLE_DB_PASSWORD: ${TEABLE_DB_PASSWORD:-Ch4ng3me_T3able_db!}
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER:-langfuse}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD:-Ch4ng3me_L4ngfuse_db!}
      LITELLM_DB_USER: ${LITELLM_DB_USER:-litellm}
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD:-Ch4ng3me_L1teLLM_db!}

    volumes:
      - pg-data:/var/lib/postgresql/data

    # -------------------------------------------------------------------------
    # Locale installation + inline init.sql
    #
    # Because Portainer stacks cannot use build contexts, locale setup that
    # normally lives in postgres/Dockerfile is done here at container start.
    # The init.sql generation is identical to the parent compose file.
    # -------------------------------------------------------------------------
    entrypoint:
      - bash
      - -c
      - |
        # Install locale (replaces Dockerfile RUN step)
        apt-get update \
          && apt-get install -y --no-install-recommends locales \
          && sed -i "/${POSTGRES_LOCALE:-ru_RU.UTF-8}/s/^# //" /etc/locale.gen \
          && locale-gen \
          && apt-get purge -y --auto-remove \
          && rm -rf /var/lib/apt/lists/*

        EXTENSIONS="vector pg_trgm unaccent \"uuid-ossp\""

        {
          echo "-- init.sql — auto-generated by entrypoint"

          # ── per-service users (each owns their database) ──
          echo "CREATE USER \"$(printf '%s' "$${RAGFLOW_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${RAGFLOW_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${DIFY_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${DIFY_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${OPENWEBUI_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${OPENWEBUI_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${LIGHTRAG_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${LIGHTRAG_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${MEM0_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${MEM0_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${HINDSIGHT_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${HINDSIGHT_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${DIRECTUS_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${DIRECTUS_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${NOCODB_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${NOCODB_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${TEABLE_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${TEABLE_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${LANGFUSE_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${LANGFUSE_DB_PASSWORD}" | sed "s/'/''/g")';"
          echo "CREATE USER \"$(printf '%s' "$${LITELLM_DB_USER}" | sed 's/\"/\"\"/g')\" WITH PASSWORD '$(printf '%s' "$${LITELLM_DB_PASSWORD}" | sed "s/'/''/g")';"

          # ── per-service databases (owned by their user) ──
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_RAGFLOW:-ragflow}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${RAGFLOW_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_DIFY:-dify}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${DIFY_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_OPENWEBUI:-openwebui}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${OPENWEBUI_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_LIGHTRAG:-lightrag}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${LIGHTRAG_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_MEM0:-mem0}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${MEM0_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_HINDSIGHT:-hindsight}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${HINDSIGHT_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_DIRECTUS:-directus}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${DIRECTUS_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_NOCODB:-nocodb}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${NOCODB_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_TEABLE:-teable}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${TEABLE_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_LANGFUSE:-langfuse}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${LANGFUSE_DB_USER}" | sed 's/\"/\"\"/g')\";"
          echo "CREATE DATABASE \"$(printf '%s' "$${POSTGRES_DB_LITELLM:-litellm}" | sed 's/\"/\"\"/g')\" OWNER \"$(printf '%s' "$${LITELLM_DB_USER}" | sed 's/\"/\"\"/g')\";"

          # ── extensions + public schema grant in each service database ──
          for dbinfo in \
            "$${POSTGRES_DB_RAGFLOW:-ragflow}/$${RAGFLOW_DB_USER}" \
            "$${POSTGRES_DB_DIFY:-dify}/$${DIFY_DB_USER}" \
            "$${POSTGRES_DB_OPENWEBUI:-openwebui}/$${OPENWEBUI_DB_USER}" \
            "$${POSTGRES_DB_LIGHTRAG:-lightrag}/$${LIGHTRAG_DB_USER}" \
            "$${POSTGRES_DB_MEM0:-mem0}/$${MEM0_DB_USER}" \
            "$${POSTGRES_DB_HINDSIGHT:-hindsight}/$${HINDSIGHT_DB_USER}" \
            "$${POSTGRES_DB_DIRECTUS:-directus}/$${DIRECTUS_DB_USER}" \
            "$${POSTGRES_DB_NOCODB:-nocodb}/$${NOCODB_DB_USER}" \
            "$${POSTGRES_DB_TEABLE:-teable}/$${TEABLE_DB_USER}" \
            "$${POSTGRES_DB_LANGFUSE:-langfuse}/$${LANGFUSE_DB_USER}" \
            "$${POSTGRES_DB_LITELLM:-litellm}/$${LITELLM_DB_USER}"; do
            db="$${dbinfo%%/*}"
            usr="$${dbinfo##*/}"
            echo "\\connect $${db}"
            for ext in $${EXTENSIONS}; do
              echo "CREATE EXTENSION IF NOT EXISTS $${ext};"
            done
            echo "GRANT ALL ON SCHEMA public TO $${usr};"
          done
        } > /docker-entrypoint-initdb.d/init.sql

        # Hand off to the official PostgreSQL entrypoint
        exec docker-entrypoint.sh postgres

    networks:
      - rag-internal

    # No external port mapping — services reach Postgres via rag-internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragadmin} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    shm_size: 256mb

    cpus: ${POSTGRES_CPU_LIMIT:-2.0}
    mem_limit: ${POSTGRES_MEM_LIMIT:-1536m}
