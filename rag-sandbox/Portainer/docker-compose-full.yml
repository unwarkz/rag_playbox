###############################################################################
# RAG Sandbox — Full Stack (Portainer Self-Contained)
#
# A single, self-contained Docker Compose file designed for Portainer's
# "Add stack from repository" deployment method. No external files, no build
# contexts — everything is defined inline.
#
# NPM (Nginx Proxy Manager) is the ONLY service exposing external ports
# (80, 443, 8020). All other services are accessed via internal networks
# and proxied through NPM.
#
# Usage:
#   Portainer → Stacks → Add stack → Repository → point to this file
#   Or: docker compose -f docker-compose-full.yml up -d
###############################################################################

name: rag-sandbox

# =============================================================================
# YAML Anchors — reusable fragments applied to every service
# =============================================================================

x-restart: &restart
  restart: ${RESTART_POLICY:-unless-stopped}

x-logging: &logging
  logging:
    driver: ${LOG_DRIVER:-json-file}
    options:
      max-size: ${LOG_MAX_SIZE:-50m}
      max-file: ${LOG_MAX_FILE:-3}

x-default-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256m

x-depends-db: &depends-db
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

x-depends-full: &depends-full
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    qdrant:
      condition: service_healthy
    minio:
      condition: service_healthy

x-dify-shared-env: &dify-shared-env
  SECRET_KEY: ${DIFY_SECRET_KEY:-Ch4ng3me_D1fy_Secret_32chars_min!}
  DB_HOST: ${DIFY_DB_HOST:-postgres}
  DB_PORT: ${DIFY_DB_PORT:-5432}
  DB_USERNAME: ${DIFY_DB_USER:-ragadmin}
  DB_PASSWORD: ${DIFY_DB_PASSWORD:-Ch4ng3me_P0stgres!}
  DB_DATABASE: ${DIFY_DB_NAME:-dify}
  REDIS_HOST: ${DIFY_REDIS_HOST:-redis}
  REDIS_PORT: ${DIFY_REDIS_PORT:-6379}
  REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-Ch4ng3me_R3dis!}
  REDIS_DB: "${DIFY_REDIS_DB:-1}"
  CELERY_BROKER_URL: ${DIFY_CELERY_BROKER_URL:-redis://:Ch4ng3me_R3dis!@redis:6379/2}
  VECTOR_STORE: qdrant
  QDRANT_URL: http://qdrant:${QDRANT_REST_PORT:-6333}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
  STORAGE_TYPE: ${DIFY_STORAGE_TYPE:-s3}
  S3_ENDPOINT: ${DIFY_S3_ENDPOINT:-http://minio:9000}
  S3_BUCKET_NAME: ${DIFY_S3_BUCKET:-dify}
  S3_ACCESS_KEY: ${DIFY_S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${DIFY_S3_SECRET_KEY:-Ch4ng3me_Min10!}
  S3_REGION: ${DIFY_S3_REGION:-us-east-1}
  CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
  CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_API_KEY:-Ch4ng3me_D1fy_S4ndbox!}
  MAIL_TYPE: ""
  SMTP_SERVER: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  MAIL_DEFAULT_SEND_FROM: ""
  TZ: ${TZ:-UTC}

# =============================================================================
# Services
# =============================================================================

services:

  # ===========================================================================
  # DATABASE LAYER
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # PostgreSQL (pgvector) — Portainer-compatible, no Dockerfile
  # ---------------------------------------------------------------------------
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg17}
    container_name: rag-postgres
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Ch4ng3me_P0stgres!}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---locale=ru_RU.UTF-8 --encoding=UTF8}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
    volumes:
      - pg-data:/var/lib/postgresql/data
    entrypoint:
      - bash
      - -c
      - |
        apt-get update -qq \
          && apt-get install -y --no-install-recommends locales >/dev/null 2>&1 \
          && sed -i '/ru_RU.UTF-8/s/^# //' /etc/locale.gen \
          && locale-gen >/dev/null 2>&1 \
          && rm -rf /var/lib/apt/lists/*
        DATABASES="ragflow dify openwebui lightrag mem0 hindsight directus nocodb teable langfuse litellm"
        EXTENSIONS="vector pg_trgm unaccent \"uuid-ossp\""
        {
          echo "-- init.sql — auto-generated by entrypoint"
          for db in $${DATABASES}; do
            echo "CREATE DATABASE $${db};"
          done
          for db in $${DATABASES}; do
            echo "\\connect $${db}"
            for ext in $${EXTENSIONS}; do
              echo "CREATE EXTENSION IF NOT EXISTS $${ext};"
            done
          done
        } > /docker-entrypoint-initdb.d/init.sql
        exec docker-entrypoint.sh postgres
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragadmin} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-2.0}"
          memory: ${POSTGRES_MEM_LIMIT:-1536m}

  # ---------------------------------------------------------------------------
  # Redis (Valkey)
  # ---------------------------------------------------------------------------
  redis:
    image: ${REDIS_IMAGE:-valkey/valkey:9.0.3-alpine}
    container_name: rag-redis
    <<: [*restart, *logging]
    command: >-
      valkey-server
        --requirepass ${REDIS_PASSWORD:-Ch4ng3me_R3dis!}
        --save 60 1
        --maxmemory ${REDIS_MAXMEMORY:-180mb}
        --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    volumes:
      - redis-data:/data
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD:-Ch4ng3me_R3dis!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: ${REDIS_MEM_LIMIT:-256m}

  # ---------------------------------------------------------------------------
  # Qdrant — vector database
  # ---------------------------------------------------------------------------
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.16.3}
    container_name: rag-qdrant
    <<: [*restart, *logging]
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: "false"
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${QDRANT_CPU_LIMIT:-1.0}"
          memory: ${QDRANT_MEM_LIMIT:-1024m}

  # ---------------------------------------------------------------------------
  # Neo4j — graph database
  # ---------------------------------------------------------------------------
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:2026.02.3-community}
    container_name: rag-neo4j
    <<: [*restart, *logging]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/Ch4ng3me_Neo4j!}
      NEO4J_PLUGINS: ${NEO4J_PLUGINS:-["apoc","graph-data-science"]}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-256m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-256m}
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      TZ: ${TZ:-UTC}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "${NEO4J_CPU_LIMIT:-1.0}"
          memory: ${NEO4J_MEM_LIMIT:-1024m}

  # ---------------------------------------------------------------------------
  # MinIO — object storage
  # ---------------------------------------------------------------------------
  minio:
    image: ${MINIO_IMAGE:-pgsty/minio:latest}
    container_name: rag-minio
    <<: [*restart, *logging]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-Ch4ng3me_Min10!}
    volumes:
      - minio-data:/data
    networks:
      - rag-internal
      - rag-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${MINIO_CPU_LIMIT:-0.5}"
          memory: ${MINIO_MEM_LIMIT:-256m}

  # ===========================================================================
  # AI/ML INFERENCE LAYER
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Embedding — Infinity serving embedding models
  # ---------------------------------------------------------------------------
  embedding:
    image: ${INFINITY_IMAGE:-michaelf34/infinity:latest}
    container_name: rag-embedding
    <<: [*restart, *logging]
    command: >-
      v2
        --model-name-or-path ${EMBED_MODEL:-Qwen/Qwen3-Embedding-0.6B}
        --served-model-name ${EMBED_SERVED_NAME:-embed}
        --port 7997
        --device cpu
        --batch-size 32
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_HUB_CACHE: /models
    volumes:
      - models-cache:/models
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7997/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${EMBEDDING_CPU_LIMIT:-2.0}"
          memory: ${EMBEDDING_MEM_LIMIT:-1024m}

  # ---------------------------------------------------------------------------
  # Reranker — Infinity serving reranking models
  # ---------------------------------------------------------------------------
  reranker:
    image: ${INFINITY_IMAGE:-michaelf34/infinity:latest}
    container_name: rag-reranker
    <<: [*restart, *logging]
    command: >-
      v2
        --model-name-or-path ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
        --served-model-name ${RERANK_SERVED_NAME:-rerank}
        --port 7998
        --device cpu
        --batch-size 16
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_HUB_CACHE: /models
    volumes:
      - models-cache:/models
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7998/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${RERANKER_CPU_LIMIT:-1.0}"
          memory: ${RERANKER_MEM_LIMIT:-768m}

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference
  # ---------------------------------------------------------------------------
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: rag-ollama
    <<: [*restart, *logging]
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_ORIGINS: "*"
      OLLAMA_API_TOKEN: ${OLLAMA_API_TOKEN:-}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      TZ: ${TZ:-UTC}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPU_LIMIT:-4.0}"
          memory: ${OLLAMA_MEM_LIMIT:-3072m}

  # ---------------------------------------------------------------------------
  # Docling — document conversion
  # ---------------------------------------------------------------------------
  docling:
    image: ${DOCLING_IMAGE:-quay.io/ds4sd/docling-serve:latest}
    container_name: rag-docling
    <<: [*restart, *logging]
    environment:
      DOCLING_SERVE_LOG_LEVEL: INFO
      DOCLING_SERVE_MAX_SYNC_WORKERS: "2"
      TORCH_DEVICE: cpu
    volumes:
      - docling-cache:/tmp/docling
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${DOCLING_CPU_LIMIT:-2.0}"
          memory: ${DOCLING_MEM_LIMIT:-1024m}

  # ---------------------------------------------------------------------------
  # Tika — content extraction
  # ---------------------------------------------------------------------------
  tika:
    image: ${TIKA_IMAGE:-apache/tika:latest-full}
    container_name: rag-tika
    <<: [*restart, *logging]
    environment:
      JAVA_OPTS: ${TIKA_JAVA_OPTS:--Xms128m -Xmx320m}
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9998/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${TIKA_CPU_LIMIT:-1.0}"
          memory: ${TIKA_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # Unstructured — document parsing
  # ---------------------------------------------------------------------------
  unstructured:
    image: ${UNSTRUCTURED_IMAGE:-downloads.unstructured.io/unstructured-io/unstructured:latest}
    container_name: rag-unstructured
    <<: [*restart, *logging]
    environment:
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-}
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${UNSTRUCTURED_CPU_LIMIT:-2.0}"
          memory: ${UNSTRUCTURED_MEM_LIMIT:-1024m}

  # ===========================================================================
  # RAG & MEMORY ENGINES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # LightRAG — graph-enhanced RAG engine
  # ---------------------------------------------------------------------------
  lightrag:
    image: ${LIGHTRAG_IMAGE:-ghcr.io/hkuds/lightrag:latest}
    container_name: rag-lightrag
    <<: [*restart, *logging]
    environment:
      LLM_BINDING: ${LIGHTRAG_LLM_BINDING:-openai}
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_BINDING_HOST:-http://ollama:11434/v1}
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL:-qwen3:14b}
      LLM_API_KEY: ${LIGHTRAG_LLM_API_KEY:-ollama}
      EMBEDDING_BINDING: ${LIGHTRAG_EMBEDDING_BINDING:-openai}
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_BINDING_HOST:-http://embedding:7997/v1}
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      EMBEDDING_DIM: ${LIGHTRAG_EMBEDDING_DIM:-1024}
      KV_STORAGE: PGKVStorage
      DOC_STATUS_STORAGE: PGDocStatusStorage
      VECTOR_STORAGE: QdrantVectorDBStorage
      GRAPH_STORAGE: Neo4JStorage
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ragadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Ch4ng3me_P0stgres!}
      POSTGRES_DATABASE: ${POSTGRES_DB_LIGHTRAG:-lightrag}
      REDIS_URI: redis://:${REDIS_PASSWORD:-Ch4ng3me_R3dis!}@redis:${REDIS_PORT:-6379}/3
      QDRANT_URL: http://qdrant:${QDRANT_REST_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
      NEO4J_URI: bolt://neo4j:${NEO4J_BOLT_PORT:-7687}
      NEO4J_USERNAME: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-Ch4ng3me_Neo4j!}
      PORT: ${LIGHTRAG_PORT:-9621}
      WORKING_DIR: /app/data
      MAX_TOKENS: ${LIGHTRAG_MAX_TOKENS:-32768}
      MAX_ASYNC: ${LIGHTRAG_MAX_ASYNC:-4}
      CHUNK_SIZE: ${LIGHTRAG_CHUNK_SIZE:-1200}
      CHUNK_OVERLAP: ${LIGHTRAG_CHUNK_OVERLAP:-100}
      TZ: ${TZ:-UTC}
    volumes:
      - lightrag-data:/app/data
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${LIGHTRAG_PORT:-9621}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${LIGHTRAG_CPU_LIMIT:-1.0}"
          memory: ${LIGHTRAG_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # Mem0 — memory layer for AI agents
  # ---------------------------------------------------------------------------
  mem0:
    image: ${MEM0_IMAGE:-mem0ai/mem0-server:latest}
    container_name: rag-mem0
    <<: [*restart, *logging]
    environment:
      OPENAI_API_KEY: ${MEM0_API_KEY:-Ch4ng3me_M3m0!}
      OPENAI_API_BASE: ${MEM0_LLM_BASE_URL:-http://ollama:11434}/v1
      LLM_PROVIDER: ${MEM0_LLM_PROVIDER:-ollama}
      LLM_MODEL: ${MEM0_LLM_MODEL:-qwen3:14b}
      LLM_BASE_URL: ${MEM0_LLM_BASE_URL:-http://ollama:11434}
      EMBEDDING_PROVIDER: ${MEM0_EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${MEM0_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      EMBEDDING_BASE_URL: ${MEM0_EMBEDDING_BASE_URL:-http://embedding:7997/v1}
      VECTOR_STORE: ${MEM0_VECTOR_STORE:-qdrant}
      QDRANT_HOST: ${MEM0_QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${MEM0_QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ragadmin}:${POSTGRES_PASSWORD:-Ch4ng3me_P0stgres!}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB_MEM0:-mem0}
      NEO4J_URI: bolt://neo4j:${NEO4J_BOLT_PORT:-7687}
      NEO4J_USERNAME: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-Ch4ng3me_Neo4j!}
      GRAPH_MEMORY_ENABLED: "true"
      PORT: ${MEM0_PORT:-8888}
      API_KEY: ${MEM0_API_KEY:-Ch4ng3me_M3m0!}
      TZ: ${TZ:-UTC}
    volumes:
      - mem0-data:/mem0/data
    networks:
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${MEM0_PORT:-8888}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${MEM0_CPU_LIMIT:-1.0}"
          memory: ${MEM0_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # Hindsight — conversational memory
  # ---------------------------------------------------------------------------
  hindsight:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    container_name: rag-hindsight
    <<: [*restart, *logging]
    environment:
      DATABASE_URL: ${HINDSIGHT_DB_URL:-postgresql://ragadmin:Ch4ng3me_P0stgres!@postgres:5432/hindsight}
      LLM_BASE_URL: http://ollama:${OLLAMA_PORT:-11434}/v1
      LLM_MODEL: ${MEM0_LLM_MODEL:-qwen3:14b}
      LLM_API_KEY: ollama
      EMBEDDING_BASE_URL: http://embedding:${EMBED_PORT:-7997}/v1
      EMBEDDING_MODEL: ${EMBED_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      RERANKER_BASE_URL: http://reranker:${RERANK_PORT:-7998}/v1
      RERANKER_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      API_PORT: ${HINDSIGHT_API_PORT:-8889}
      UI_PORT: ${HINDSIGHT_UI_PORT:-9999}
      TZ: ${TZ:-UTC}
    volumes:
      - hindsight-data:/home/hindsight/.hindsight
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${HINDSIGHT_API_PORT:-8889}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${HINDSIGHT_CPU_LIMIT:-1.0}"
          memory: ${HINDSIGHT_MEM_LIMIT:-512m}

  # ===========================================================================
  # USER-FACING UI PLATFORMS
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # RAGFlow — RAG orchestration platform
  # ---------------------------------------------------------------------------
  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.24.0}
    container_name: rag-ragflow
    <<: [*restart, *logging]
    environment:
      DOC_ENGINE: infinity
      DB_TYPE: postgres
      PG_HOST: ${RAGFLOW_DB_HOST:-postgres}
      PG_PORT: ${RAGFLOW_DB_PORT:-5432}
      PG_USER: ${RAGFLOW_DB_USER:-ragadmin}
      PG_PASSWORD: ${RAGFLOW_DB_PASSWORD:-Ch4ng3me_P0stgres!}
      PG_DATABASE: ${RAGFLOW_DB_NAME:-ragflow}
      REDIS_HOST: ${RAGFLOW_REDIS_HOST:-redis}
      REDIS_PORT: ${RAGFLOW_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${RAGFLOW_REDIS_PASSWORD:-Ch4ng3me_R3dis!}
      REDIS_DB: "0"
      MINIO_HOST: ${RAGFLOW_MINIO_HOST:-minio}
      MINIO_PORT: ${RAGFLOW_MINIO_PORT:-9000}
      MINIO_USER: ${RAGFLOW_MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${RAGFLOW_MINIO_PASSWORD:-Ch4ng3me_Min10!}
      TEI_ENDPOINT: http://embedding:${EMBED_PORT:-7997}
      SVR_HTTP_PORT: "9380"
      TZ: ${TZ:-UTC}
    volumes:
      - ragflow-data:/ragflow
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9380/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${RAGFLOW_CPU_LIMIT:-2.0}"
          memory: ${RAGFLOW_MEM_LIMIT:-1536m}

  # ---------------------------------------------------------------------------
  # Dify — AI workflow platform (API)
  # ---------------------------------------------------------------------------
  dify-api:
    image: ${DIFY_API_IMAGE:-langgenius/dify-api:1.13.2}
    container_name: rag-dify-api
    <<: [*restart, *logging]
    environment:
      <<: *dify-shared-env
      MODE: api
    networks:
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${DIFY_API_CPU_LIMIT:-1.5}"
          memory: ${DIFY_API_MEM_LIMIT:-768m}

  # ---------------------------------------------------------------------------
  # Dify — AI workflow platform (Worker)
  # ---------------------------------------------------------------------------
  dify-worker:
    image: ${DIFY_API_IMAGE:-langgenius/dify-api:1.13.2}
    container_name: rag-dify-worker
    <<: [*restart, *logging]
    environment:
      <<: *dify-shared-env
      MODE: worker
    networks:
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${DIFY_WORKER_CPU_LIMIT:-1.0}"
          memory: ${DIFY_WORKER_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # Dify — Sandbox (code execution)
  # ---------------------------------------------------------------------------
  dify-sandbox:
    image: ${DIFY_SANDBOX_IMAGE:-langgenius/dify-sandbox:0.2.10}
    container_name: rag-dify-sandbox
    <<: [*restart, *logging]
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY:-Ch4ng3me_D1fy_S4ndbox!}
      GIN_MODE: ${DIFY_SANDBOX_GIN_MODE:-release}
      TZ: ${TZ:-UTC}
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8194/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${DIFY_SANDBOX_CPU_LIMIT:-0.5}"
          memory: ${DIFY_SANDBOX_MEM_LIMIT:-256m}

  # ---------------------------------------------------------------------------
  # Dify — Web frontend
  # ---------------------------------------------------------------------------
  dify-web:
    image: ${DIFY_WEB_IMAGE:-langgenius/dify-web:1.13.2}
    container_name: rag-dify-web
    <<: [*restart, *logging]
    environment:
      CONSOLE_API_URL: ${DIFY_WEB_API_URL:-http://dify-api:5001}
      APP_API_URL: ${DIFY_WEB_APP_API_URL:-http://dify-api:5001}
      TZ: ${TZ:-UTC}
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      dify-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${DIFY_WEB_CPU_LIMIT:-0.5}"
          memory: ${DIFY_WEB_MEM_LIMIT:-256m}

  # ---------------------------------------------------------------------------
  # Open WebUI — chat interface
  # ---------------------------------------------------------------------------
  openwebui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: rag-openwebui
    <<: [*restart, *logging]
    environment:
      OLLAMA_BASE_URL: ${OPENWEBUI_OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_TOKEN:-}
      OPENAI_API_BASE_URLS: ${OPENWEBUI_OPENAI_API_BASE_URLS:-}
      OPENAI_API_KEYS: ${OPENWEBUI_OPENAI_API_KEYS:-}
      VECTOR_DB: qdrant
      QDRANT_URI: http://qdrant:${QDRANT_REST_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://embedding:${EMBED_PORT:-7997}/v1
      RAG_OPENAI_API_KEY: ${OPENWEBUI_RAG_OPENAI_API_KEY:-none}
      RAG_EMBEDDING_MODEL: ${EMBED_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      RAG_RERANKING_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      DATABASE_URL: ${OPENWEBUI_DB_URL:-postgresql://ragadmin:Ch4ng3me_P0stgres!@postgres:5432/openwebui}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:-Ch4ng3me_0penWebUI!}
      WEBUI_AUTH: ${OPENWEBUI_WEBUI_AUTH:-true}
      ENABLE_SIGNUP: ${OPENWEBUI_ENABLE_SIGNUP:-true}
      SMTP_SERVER: ${OPENWEBUI_SMTP_SERVER:-}
      SMTP_PORT: ${OPENWEBUI_SMTP_PORT:-587}
      SMTP_USERNAME: ${OPENWEBUI_SMTP_USERNAME:-}
      SMTP_PASSWORD: ${OPENWEBUI_SMTP_PASSWORD:-}
      TZ: ${TZ:-UTC}
    volumes:
      - openwebui-data:/app/backend/data
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${OPENWEBUI_CPU_LIMIT:-1.0}"
          memory: ${OPENWEBUI_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # Pipelines — Open WebUI pipelines
  # ---------------------------------------------------------------------------
  pipelines:
    image: ${OPENWEBUI_PIPELINES_IMAGE:-ghcr.io/open-webui/pipelines:main}
    container_name: rag-pipelines
    <<: [*restart, *logging]
    environment:
      PIPELINES_API_KEY: ${OPENWEBUI_PIPELINES_API_KEY:-Ch4ng3me_P1pelines!}
      TZ: ${TZ:-UTC}
    volumes:
      - pipelines-data:/app/pipelines
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9099/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${OPENWEBUI_PIPELINES_CPU_LIMIT:-1.0}"
          memory: ${OPENWEBUI_PIPELINES_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # AnythingLLM — all-in-one AI desktop
  # ---------------------------------------------------------------------------
  anythingllm:
    image: ${ANYTHINGLLM_IMAGE:-mintplexlabs/anythingllm:latest}
    container_name: rag-anythingllm
    <<: [*restart, *logging]
    environment:
      JWT_SECRET: ${ANYTHINGLLM_JWT_SECRET:-Ch4ng3me_4nyth1ng_JWT!}
      AUTH_TOKEN: ${ANYTHINGLLM_AUTH_TOKEN:-}
      LLM_PROVIDER: ${ANYTHINGLLM_LLM_PROVIDER:-ollama}
      OLLAMA_BASE_PATH: ${ANYTHINGLLM_OLLAMA_BASE_PATH:-http://ollama:11434}
      OLLAMA_MODEL_PREF: ${ANYTHINGLLM_OLLAMA_MODEL_PREF:-qwen3:14b}
      EMBEDDING_ENGINE: ${ANYTHINGLLM_EMBEDDING_ENGINE:-generic-openai}
      EMBEDDING_BASE_PATH: ${ANYTHINGLLM_EMBEDDING_BASE_PATH:-http://embedding:7997}
      EMBEDDING_MODEL_PREF: ${ANYTHINGLLM_EMBEDDING_MODEL_PREF:-Qwen/Qwen3-Embedding-0.6B}
      VECTOR_DB: ${ANYTHINGLLM_VECTOR_DB:-qdrant}
      QDRANT_ENDPOINT: ${ANYTHINGLLM_QDRANT_ENDPOINT:-http://qdrant:6333}
      QDRANT_API_KEY: ${ANYTHINGLLM_QDRANT_API_KEY:-Ch4ng3me_Qdr4nt!}
      STORAGE_DIR: /app/server/storage
      SERVER_PORT: "${ANYTHINGLLM_SERVER_PORT:-3001}"
      TZ: ${TZ:-UTC}
    volumes:
      - anythingllm-data:/app/server/storage
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${ANYTHINGLLM_CPU_LIMIT:-1.0}"
          memory: ${ANYTHINGLLM_MEM_LIMIT:-512m}

  # ===========================================================================
  # CONTENT MANAGEMENT SYSTEMS
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # NocoDB — open-source Airtable alternative
  # ---------------------------------------------------------------------------
  nocodb:
    image: ${NOCODB_IMAGE:-nocodb/nocodb:latest}
    container_name: rag-nocodb
    <<: [*restart, *logging]
    environment:
      NC_DB: ${NC_DB:-pg://postgres:5432?u=ragadmin&p=Ch4ng3me_P0stgres!&d=nocodb}
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET:-Ch4ng3me_N0coDB_JWT!}
      NC_REDIS_URL: ${NC_REDIS_URL:-redis://:Ch4ng3me_R3dis!@redis:6379/6}
      NC_DISABLE_TELE: "true"
      TZ: ${TZ:-UTC}
    volumes:
      - nocodb-data:/usr/app/data
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${NOCODB_CPU_LIMIT:-0.5}"
          memory: ${NOCODB_MEM_LIMIT:-256m}

  # ---------------------------------------------------------------------------
  # Directus — headless CMS
  # ---------------------------------------------------------------------------
  directus:
    image: ${DIRECTUS_IMAGE:-directus/directus:11.16}
    container_name: rag-directus
    <<: [*restart, *logging]
    environment:
      SECRET: ${DIRECTUS_SECRET:-Ch4ng3me_D1rectus_Secret_Random!}
      KEY: ${DIRECTUS_KEY:-Ch4ng3me_D1rectus_Key_Random!}
      DB_CLIENT: ${DIRECTUS_DB_CLIENT:-pg}
      DB_HOST: ${DIRECTUS_DB_HOST:-postgres}
      DB_PORT: ${DIRECTUS_DB_PORT:-5432}
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-ragadmin}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-Ch4ng3me_P0stgres!}
      CACHE_ENABLED: ${DIRECTUS_CACHE_ENABLED:-true}
      CACHE_STORE: ${DIRECTUS_CACHE_STORE:-redis}
      REDIS: ${DIRECTUS_REDIS:-redis://:Ch4ng3me_R3dis!@redis:6379/3}
      STORAGE_LOCATIONS: s3
      STORAGE_S3_DRIVER: s3
      STORAGE_S3_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET: ${MINIO_ROOT_PASSWORD:-Ch4ng3me_Min10!}
      STORAGE_S3_BUCKET: ${MINIO_DEFAULT_BUCKET:-rag-documents}
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_ENDPOINT: http://minio:${MINIO_API_PORT:-9000}
      STORAGE_S3_FORCE_PATH_STYLE: "true"
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-Ch4ng3me_D1rectus_Admin!}
      EMAIL_FROM: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      EMAIL_TRANSPORT: smtp
      EMAIL_SMTP_HOST: ""
      EMAIL_SMTP_PORT: "587"
      PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:8027}
      TZ: ${TZ:-UTC}
    volumes:
      - directus-uploads:/directus/uploads
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8055/server/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${DIRECTUS_CPU_LIMIT:-0.5}"
          memory: ${DIRECTUS_MEM_LIMIT:-384m}

  # ---------------------------------------------------------------------------
  # Teable — spreadsheet-database hybrid
  # ---------------------------------------------------------------------------
  teable:
    image: ${TEABLE_IMAGE:-ghcr.io/teableio/teable:latest}
    container_name: rag-teable
    <<: [*restart, *logging]
    environment:
      PRISMA_DATABASE_URL: ${TEABLE_DB_URL:-postgresql://ragadmin:Ch4ng3me_P0stgres!@postgres:5432/teable}
      SECRET_KEY: ${TEABLE_SECRET_KEY:-Ch4ng3me_T3able_Secret!}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8028}
      BACKEND_STORAGE_PROVIDER: minio
      BACKEND_STORAGE_MINIO_ENDPOINT: minio
      BACKEND_STORAGE_MINIO_PORT: ${MINIO_API_PORT:-9000}
      BACKEND_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      BACKEND_STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-Ch4ng3me_Min10!}
      BACKEND_STORAGE_MINIO_BUCKET: ${MINIO_DEFAULT_BUCKET:-rag-documents}
      BACKEND_STORAGE_MINIO_USE_SSL: "false"
      BACKEND_CACHE_PROVIDER: redis
      BACKEND_CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-Ch4ng3me_R3dis!}@redis:${REDIS_PORT:-6379}/7
      BACKEND_MAIL_HOST: ""
      BACKEND_MAIL_PORT: "587"
      BACKEND_MAIL_SECURE: "false"
      BACKEND_MAIL_SENDER: ""
      BACKEND_MAIL_SENDER_NAME: "Teable"
      TZ: ${TZ:-UTC}
    volumes:
      - teable-data:/app/.cache
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "${TEABLE_CPU_LIMIT:-0.5}"
          memory: ${TEABLE_MEM_LIMIT:-384m}

  # ===========================================================================
  # INFRASTRUCTURE & PROXY
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # NPM — MariaDB backend
  # ---------------------------------------------------------------------------
  npm-db:
    image: ${NPM_DB_IMAGE:-jc21/mariadb-aria:latest}
    container_name: rag-npm-db
    <<: [*restart, *logging]
    environment:
      MYSQL_ROOT_PASSWORD: ${NPM_DB_MYSQL_ROOT_PASSWORD:-Ch4ng3me_NPM_Root!}
      MYSQL_DATABASE: ${NPM_DB_MYSQL_DATABASE:-npm}
      MYSQL_USER: ${NPM_DB_MYSQL_USER:-npm}
      MYSQL_PASSWORD: ${NPM_DB_MYSQL_PASSWORD:-Ch4ng3me_NPM_Mysql!}
      TZ: ${TZ:-UTC}
    volumes:
      - npm-mysql:/var/lib/mysql
    networks:
      - rag-frontend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${NPM_DB_CPU_LIMIT:-0.5}"
          memory: ${NPM_DB_MEM_LIMIT:-256m}

  # ---------------------------------------------------------------------------
  # Nginx Proxy Manager — the ONLY service with external ports
  # ---------------------------------------------------------------------------
  nginx-proxy-manager:
    image: ${NPM_IMAGE:-jc21/nginx-proxy-manager:latest}
    container_name: rag-npm
    <<: [*restart, *logging]
    environment:
      DB_MYSQL_HOST: npm-db
      DB_MYSQL_PORT: "3306"
      DB_MYSQL_USER: ${NPM_DB_MYSQL_USER:-npm}
      DB_MYSQL_PASSWORD: ${NPM_DB_MYSQL_PASSWORD:-Ch4ng3me_NPM_Mysql!}
      DB_MYSQL_NAME: ${NPM_DB_MYSQL_DATABASE:-npm}
      TZ: ${TZ:-UTC}
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-8020}:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - rag-frontend
    depends_on:
      npm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:81/api/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${NPM_CPU_LIMIT:-0.5}"
          memory: ${NPM_MEM_LIMIT:-256m}

  # ---------------------------------------------------------------------------
  # LiteLLM — LLM gateway / proxy (inline config.yaml)
  # ---------------------------------------------------------------------------
  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-v1.82.3-stable}
    container_name: rag-litellm
    <<: [*restart, *logging]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-Ch4ng3me_L1teLLM_Master!}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-sk-or-v1-your_key_here}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_key_here}
      QWEN_API_KEY: ${QWEN_API_KEY:-your_qwen_key_here}
      KIMI_API_KEY: ${KIMI_API_KEY:-your_kimi_key_here}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-your_minimax_key_here}
      HF_TOKEN: ${HF_TOKEN:-hf_your_token_here}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Ch4ng3me_R3dis!}
      LITELLM_DB_URL: ${LITELLM_DB_URL:-postgresql://ragadmin:Ch4ng3me_P0stgres!@postgres:5432/litellm}
      TZ: ${TZ:-UTC}
    entrypoint:
      - bash
      - -c
      - |
        cat > /app/config.yaml << 'LITELLM_CONFIG'
        model_list:
          - model_name: qwen3-14b
            litellm_params:
              model: ollama/qwen3:14b
              api_base: http://ollama:11434
              stream: true
          - model_name: qwen3-1.7b
            litellm_params:
              model: ollama/qwen3:1.7b
              api_base: http://ollama:11434
              stream: true
          - model_name: nemotron-3-super
            litellm_params:
              model: openrouter/nvidia/nemotron-3-super
              api_key: os.environ/OPENROUTER_API_KEY
          - model_name: kimi-k2.5
            litellm_params:
              model: openrouter/moonshotai/kimi-k2.5
              api_key: os.environ/OPENROUTER_API_KEY
          - model_name: glm-5
            litellm_params:
              model: openrouter/thudm/glm-5
              api_key: os.environ/OPENROUTER_API_KEY
          - model_name: minimax-m2.7
            litellm_params:
              model: openrouter/minimax/minimax-m2.7
              api_key: os.environ/OPENROUTER_API_KEY
          - model_name: qwen3.5-cloud
            litellm_params:
              model: openai/qwen3.5
              api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
              api_key: os.environ/QWEN_API_KEY
          - model_name: gemini-2.5-flash
            litellm_params:
              model: gemini/gemini-2.5-flash
              api_key: os.environ/GEMINI_API_KEY
          - model_name: kimi-direct
            litellm_params:
              model: openai/moonshot-v1-auto
              api_base: https://api.moonshot.cn/v1
              api_key: os.environ/KIMI_API_KEY
        litellm_settings:
          drop_params: true
          request_timeout: 120
          num_retries: 3
          set_verbose: false
          cache: true
          cache_params:
            type: redis
            host: redis
            port: 6379
            password: os.environ/REDIS_PASSWORD
            db: 8
        general_settings:
          master_key: os.environ/LITELLM_MASTER_KEY
          database_url: os.environ/LITELLM_DB_URL
          alerting:
            - log
        LITELLM_CONFIG
        exec litellm --config /app/config.yaml --port 4000 --host 0.0.0.0
    volumes:
      - litellm-data:/app/data
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${LITELLM_CPU_LIMIT:-1.0}"
          memory: ${LITELLM_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # Langfuse — LLM observability & tracing
  # ---------------------------------------------------------------------------
  langfuse:
    image: ${LANGFUSE_IMAGE:-langfuse/langfuse:3}
    container_name: rag-langfuse
    <<: [*restart, *logging]
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://ragadmin:Ch4ng3me_P0stgres!@postgres:5432/langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-Ch4ng3me_Langfuse_NextAuth!}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      SALT: ${LANGFUSE_SALT:-Ch4ng3me_Langfuse_Salt_Random!}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-rag-sandbox}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-RAG Sandbox}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-default}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-Default Project}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-change-me}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-change-me}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@example.com}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-Ch4ng3me_Langfuse_Admin!}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      TZ: ${TZ:-UTC}
    volumes:
      - langfuse-data:/app/data
    networks:
      - rag-internal
      - rag-frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${LANGFUSE_CPU_LIMIT:-1.0}"
          memory: ${LANGFUSE_MEM_LIMIT:-512m}

  # ---------------------------------------------------------------------------
  # DBHub — database MCP server
  # ---------------------------------------------------------------------------
  dbhub:
    image: ${DBHUB_IMAGE:-bytebase/dbhub:latest}
    container_name: rag-dbhub
    <<: [*restart, *logging]
    environment:
      DSN: ${DBHUB_DSN:-postgresql://ragadmin:Ch4ng3me_P0stgres!@postgres:5432/ragdb}
      TZ: ${TZ:-UTC}
    networks:
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8033/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${DBHUB_CPU_LIMIT:-0.5}"
          memory: ${DBHUB_MEM_LIMIT:-256m}

