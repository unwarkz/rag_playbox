# =============================================================================
# RAG Sandbox — Complete Full Stack (Portainer)
# =============================================================================
# Complete RAG Sandbox stack — all services, deployable from Portainer.
#
# Uses the Portainer-specific postgres (no build context) and reuses all
# other per-service compose files from the parent directory.
#
# WARNING: This launches ALL services and requires significant resources.
# Consider using group files for selective deployment.
#
# Groups included:
#   Databases:      PostgreSQL (Portainer), Redis, Qdrant, Neo4j, MinIO
#   AI/ML:          Embedding, Reranker, Ollama, Docling, Tika, Unstructured
#   RAG/Memory:     LightRAG, Mem0, Hindsight
#   UI Platforms:   RAGFlow, Dify, Open WebUI, Pipelines, AnythingLLM
#   CMS:            NocoDB, Directus, Teable
#   Infrastructure: Nginx Proxy Manager, LiteLLM, Langfuse, DBHub
#
# Usage:
#   Portainer → Stacks → Add stack → Repository → point to this file
#   Or: docker compose -f Portainer/docker-compose-full.yml up -d
# =============================================================================

include:
  # Common configuration
  - ../docker-compose-common.yml
  # Databases (postgres is Portainer-specific, rest reused from parent)
  - docker-compose-postgres.yml
  - ../docker-compose-redis.yml
  - ../docker-compose-qdrant.yml
  - ../docker-compose-neo4j.yml
  - ../docker-compose-minio.yml
  # AI/ML inference
  - ../docker-compose-embedding.yml
  - ../docker-compose-reranker.yml
  - ../docker-compose-ollama.yml
  - ../docker-compose-docling.yml
  - ../docker-compose-tika.yml
  - ../docker-compose-unstructured.yml
  # RAG and memory
  - ../docker-compose-lightrag.yml
#  - ../docker-compose-mem0.yml
  - ../docker-compose-hindsight.yml
  # UI platforms
  - ../docker-compose-ragflow.yml
  - ../docker-compose-dify.yml
  - ../docker-compose-openwebui.yml
  - ../docker-compose-pipelines.yml
  - ../docker-compose-anythingllm.yml
  # Content management
  - ../docker-compose-nocodb.yml
  - ../docker-compose-directus.yml
  - ../docker-compose-teable.yml
  # Infrastructure
  - ../docker-compose-npm.yml
  - ../docker-compose-litellm.yml
  - ../docker-compose-langfuse.yml
  - ../docker-compose-dbhub.yml
