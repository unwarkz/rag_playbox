  mysql:
    # mysql:5.7 linux/arm64 image is unavailable.
    image: ${MYSQL_IMAGE:-mysql:8.0.39}
    container_name: ${DOCKER_STACK_PREFIX}-mysql

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-Change_meMYsq!!@#!}
    command:
      --max_connections=1000
      --character-set-server=${MYSQL_CHARSET:-utf8mb4}
      --collation-server=${MYSQL_COLLATE:-utf8mb4_unicode_ci}
      --default-authentication-plugin=${MYSQL_DEFAULT_AUTH:-mysql_native_password}
      --tls_version="TLSv1.2,TLSv1.3"
      --init-file /data/application/init.sql
      --binlog_expire_logs_seconds=604800
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ragflow
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped
    entrypoint:
      - bash
      - -c
      - |
        {
          echo "-- init.sql — auto-generated by entrypoint"
          
          echo "CREATE DATABASE IF NOT EXISTS rag_flow;"
          echo "USE rag_flow;"
        } > /data/application/init.sql

        exec docker-entrypoint.sh

