###############################################################################
#  docker-compose-redis.yml — Valkey (Redis-compatible) cache & message broker
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-redis.yml up -d
#
#  Image: valkey/valkey:9.0.3-alpine
#  No external port mapping — access via rag-internal network only.
#  Consumers: Dify, RAGFlow, Directus, LiteLLM, and other services
#  needing a cache or pub/sub broker.
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  redis:
    image: ${REDIS_IMAGE:-valkey/valkey:9.0.3-alpine}
    container_name: rag-redis

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    # -------------------------------------------------------------------------
    # Per-service Redis users are configured via an ACL file generated at
    # container start.  Each service gets its own username + password so that
    # compromising one service's credentials does not expose the others.
    #
    # The default user (used by the health check) keeps REDIS_PASSWORD.
    # -------------------------------------------------------------------------
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Ch4ng3me_R3dis!}
      RAGFLOW_REDIS_PASSWORD: ${RAGFLOW_REDIS_PASSWORD:-Ch4ng3me_R4gfl0w_redis!}
      DIFY_REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-Ch4ng3me_D1fy_redis!}
      LIGHTRAG_REDIS_PASSWORD: ${LIGHTRAG_REDIS_PASSWORD:-Ch4ng3me_L1ghtRAG_redis!}
      DIRECTUS_REDIS_PASSWORD: ${DIRECTUS_REDIS_PASSWORD:-Ch4ng3me_D1rectus_redis!}
      NOCODB_REDIS_PASSWORD: ${NOCODB_REDIS_PASSWORD:-Ch4ng3me_N0c0DB_redis!}
      TEABLE_REDIS_PASSWORD: ${TEABLE_REDIS_PASSWORD:-Ch4ng3me_T3able_redis!}
      LITELLM_REDIS_PASSWORD: ${LITELLM_REDIS_PASSWORD:-Ch4ng3me_L1teLLM_redis!}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-180mb}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}

    entrypoint:
      - sh
      - -c
      - |
        # Generate per-service ACL file from environment variables
        {
          echo "user default on >$${REDIS_PASSWORD} ~* &* +@all"
          echo "user ragflow on >$${RAGFLOW_REDIS_PASSWORD} ~* &* +@all"
          echo "user dify on >$${DIFY_REDIS_PASSWORD} ~* &* +@all"
          echo "user lightrag on >$${LIGHTRAG_REDIS_PASSWORD} ~* &* +@all"
          echo "user directus on >$${DIRECTUS_REDIS_PASSWORD} ~* &* +@all"
          echo "user nocodb on >$${NOCODB_REDIS_PASSWORD} ~* &* +@all"
          echo "user teable on >$${TEABLE_REDIS_PASSWORD} ~* &* +@all"
          echo "user litellm on >$${LITELLM_REDIS_PASSWORD} ~* &* +@all"
        } > /data/acl.conf

        exec valkey-server \
          --aclfile /data/acl.conf \
          --save 60 1 \
          --maxmemory $${REDIS_MAXMEMORY} \
          --maxmemory-policy $${REDIS_MAXMEMORY_POLICY}

    volumes:
      - redis-data:/data

    networks:
      - rag-internal

    # No external port mapping — services reach Redis via rag-internal

    healthcheck:
      test:
        [
          "CMD",
          "valkey-cli",
          "-a",
          "${REDIS_PASSWORD:-Ch4ng3me_R3dis!}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Suppress Redis memory-overcommit warning.
    # vm.overcommit_memory is not a namespaced sysctl; setting it here requires
    # the Docker daemon to allow it (add vm.overcommit_memory=1 to
    # /etc/sysctl.conf on the host for a permanent fix).
    #sysctls:
    #  vm.overcommit_memory: "1"

    cpus: ${REDIS_CPU_LIMIT:-0.5}
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
