###############################################################################
#  docker-compose-common.yml — Shared anchors, networks & volumes
#
#  This file is included by every per-service compose file via:
#    include:
#      - docker-compose-common.yml
#
#  It defines YAML anchors (x-*), the two project networks, and all named
#  volumes for the RAG Sandbox stack.
###############################################################################

name: rag-toolbox-${DOCKER_STACK_PREFIX:-rag}

# =============================================================================
# YAML ANCHORS — reusable fragments for per-service compose files
# =============================================================================

x-common: &common
  restart: ${RESTART_POLICY:-unless-stopped}
  logging:
    driver: ${LOG_DRIVER:-json-file}
    options:
      max-size: ${LOG_MAX_SIZE:-50m}
      max-file: ${LOG_MAX_FILE:-3}
  cpus: ${DEFAULT_CPU_LIMIT:-1.0}
  mem_limit: ${DEFAULT_MEM_LIMIT:-512m}


# =============================================================================
# NETWORKS
# =============================================================================

networks:
  rag-internal:
    driver: bridge
    # All containers (databases, services, everything)

  rag-frontend:
    driver: bridge
    # UI containers + Nginx Proxy Manager only

# =============================================================================
# VOLUMES — every named volume used across the stack
# =============================================================================

volumes:
  # --- Data layer ---
  pg-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:
  minio-data:
  infinity-data:
  mysql_data:

  # --- AI / ML layer ---
  models-cache:
  ollama-data:

  # --- RAG engines ---
  lightrag-data:
  mem0-data:
  hindsight-data:
  docling-cache:

  # --- Platforms / UIs ---
  ragflow-data:
  dify-storage:
  openwebui-data:
  pipelines-data:
  anythingllm-data:

  # --- Data management ---
  nocodb-data:
  directus-uploads:
  teable-data:

  # --- Proxy (Nginx Proxy Manager) ---
  npm-data:
  npm-letsencrypt:
  npm-mysql:

  # --- Proxy (Caddy) ---
  caddy-data:
  caddy-config:

  # --- Observability ---
  litellm-data:
  langfuse-data:

# =============================================================================
# SERVICES — defined in per-service compose files, not here
# =============================================================================

services: {}
