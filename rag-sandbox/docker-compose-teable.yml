###############################################################################
#  docker-compose-teable.yml — Teable spreadsheet database
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-postgres.yml \
#                   -f docker-compose-redis.yml \
#                   -f docker-compose-minio.yml \
#                   -f docker-compose-teable.yml up -d
#
#  Image: ghcr.io/teableio/teable:latest
#  No external port mapping — access via rag-frontend + NPM only.
#  Storage backends:
#    Metadata  → PostgreSQL (teable database, via Prisma)
#    Cache     → Redis
#    Files     → MinIO (S3-compatible)
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  createbuckets:
    image: pgsty/mc
    networks:
      - rag-internal
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb minio/${MINIO_DEFAULT_BUCKET:-public};
      /usr/bin/mc anonymous set public minio/${MINIO_DEFAULT_BUCKET:-public};
      /usr/bin/mc mb minio/${MINIO_PRIVATE_BUCKET:-private};
      exit 0;
      "
    depends_on:
      minio:
        condition: service_healthy

  teable:
    image: ${TEABLE_IMAGE:-ghcr.io/teableio/teable:latest}
    container_name: ${DOCKER_STACK_PREFIX}-teable

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    environment:
      # --- PostgreSQL connection via Prisma ---
   
      PRISMA_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_TEABLE:-teable}

      # --- Application secret ---
      SECRET_KEY: ${TEABLE_SECRET_KEY:-Ch4ng3me_T3able_Secret!}

      # --- Public URL (used for CORS / link generation) ---
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://teable:8028}

      # --- S3 storage via MinIO ---
      BACKEND_STORAGE_PROVIDER: ${TEABLE_STORAGE_PROVIDER:-minio}
      BACKEND_STORAGE_MINIO_ENDPOINT: minio
      BACKEND_STORAGE_MINIO_PORT: ${MINIO_API_PORT:-9000}
      BACKEND_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER?error}
      BACKEND_STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD?error}
      BACKEND_STORAGE_MINIO_PUBLIC_BUCKET: ${MINIO_DEFAULT_BUCKET:-public}
      BACKEND_STORAGE_MINIO_PRIVATE_BUCKET: ${MINIO_PRIVATE_BUCKET:-private}
      BACKEND_STORAGE_MINIO_USE_SSL: "${TEABLE_STORAGE_MINIO_USE_SSL:-false}"

      # --- Redis (db:7 — per-service user auth) ---
      BACKEND_CACHE_PROVIDER: ${TEABLE_CACHE_PROVIDER:-redis}
      BACKEND_CACHE_REDIS_URI: ${TEABLE_REDIS_URI:-redis://${TEABLE_REDIS_USER}:${TEABLE_REDIS_PASSWORD}@redis:6379/${TEABLE_REDIS_DB:-6}}

      # --- Mail settings (placeholder — configure for production) ---
      BACKEND_MAIL_HOST: ${SMTP_HOST:-}
      BACKEND_MAIL_PORT: "${SMTP_PORT:-587}"
      BACKEND_MAIL_SECURE: "${SMTP_SECURE:-false}"
      BACKEND_MAIL_SENDER: ${SMTP_FROM:-}
      BACKEND_MAIL_SENDER_NAME: ${TEABLE_MAIL_SENDER_NAME:-Teable}

      TZ: ${TZ:-UTC}

    volumes:
      - teable-data:/app/.cache

    networks:
      # Internal: reaches postgres, redis, minio
      - rag-internal
      # Frontend: exposed via Nginx Proxy Manager
      - rag-frontend

    # No external port mapping — access via rag-frontend + NPM only
    # WebUI: http://teable:3000

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:3000/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

    cpus: ${TEABLE_CPU_LIMIT:-2}
    mem_limit: ${TEABLE_MEM_LIMIT:-4024m}
