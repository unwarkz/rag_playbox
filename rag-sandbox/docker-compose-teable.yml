###############################################################################
#  docker-compose-teable.yml — Teable spreadsheet database
#
#  Usage:
#    docker compose -f docker-compose-common.yml \
#                   -f docker-compose-postgres.yml \
#                   -f docker-compose-redis.yml \
#                   -f docker-compose-minio.yml \
#                   -f docker-compose-teable.yml up -d
#
#  Image: ghcr.io/teableio/teable:latest
#  No external port mapping — access via rag-frontend + NPM only.
#  Storage backends:
#    Metadata  → PostgreSQL (teable database, via Prisma)
#    Cache     → Redis (db:7)
#    Files     → MinIO (S3-compatible) — teable-public + teable-private buckets
#               NOTE: both buckets must be pre-created in MinIO before starting
###############################################################################

# =============================================================================
# SERVICE
# =============================================================================

services:
  teable:
    image: ${TEABLE_IMAGE:-ghcr.io/teableio/teable:latest}
    container_name: ${DOCKER_STACK_PREFIX}-teable

    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-3}

    environment:
      # --- PostgreSQL connection via Prisma ---
      PRISMA_DATABASE_URL: ${TEABLE_DB_URL:-postgresql://${TEABLE_DB_USER}:${TEABLE_DB_PASSWORD}@postgres:5432/${POSTGRES_DB_TEABLE}}

      # --- Application ---
      SECRET_KEY: ${TEABLE_SECRET_KEY:-Ch4ng3me_T3able_Secret!}
      # PUBLIC_ORIGIN must be set to the externally accessible Teable URL
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:3000}
      NEXT_ENV_IMAGES_ALL_REMOTE: "${NEXT_ENV_IMAGES_ALL_REMOTE:-true}"

      # --- Redis cache (db:7 — per-service ACL user) ---
      BACKEND_CACHE_PROVIDER: ${TEABLE_CACHE_PROVIDER:-redis}
      BACKEND_CACHE_REDIS_URI: ${TEABLE_REDIS_URI:-redis://${TEABLE_REDIS_USER}:${TEABLE_REDIS_PASSWORD}@redis:6379/${TEABLE_REDIS_DB:-7}}

      # --- MinIO S3-compatible object storage ---
      # NOTE: teable-public (with public read policy) and teable-private
      #       buckets must be pre-created in MinIO before starting Teable.
      BACKEND_STORAGE_PROVIDER: ${TEABLE_STORAGE_PROVIDER:-minio}
      BACKEND_STORAGE_PUBLIC_BUCKET: ${TEABLE_PUBLIC_BUCKET:-teable-public}
      BACKEND_STORAGE_PRIVATE_BUCKET: ${TEABLE_PRIVATE_BUCKET:-teable-private}
      # Internal endpoint: used by the Teable backend for server-side API calls
      BACKEND_STORAGE_MINIO_INTERNAL_ENDPOINT: ${TEABLE_MINIO_INTERNAL_ENDPOINT:-minio}
      BACKEND_STORAGE_MINIO_INTERNAL_PORT: "${MINIO_API_PORT:-9000}"
      # Public endpoint: used to construct browser-accessible file URLs
      # Set TEABLE_MINIO_ENDPOINT to your server's IP or domain for production
      BACKEND_STORAGE_MINIO_ENDPOINT: ${TEABLE_MINIO_ENDPOINT:-minio}
      BACKEND_STORAGE_MINIO_PORT: "${MINIO_API_PORT:-9000}"
      BACKEND_STORAGE_MINIO_USE_SSL: "${TEABLE_STORAGE_MINIO_USE_SSL:-false}"
      BACKEND_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      BACKEND_STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-Ch4ng3me_Min10!}
      # STORAGE_PREFIX is the base URL embedded in generated file links —
      # must be publicly reachable from browsers; set TEABLE_STORAGE_PREFIX
      STORAGE_PREFIX: ${TEABLE_STORAGE_PREFIX:-http://localhost:9000}

      # --- External database proxy (optional — exposes Teable DB to external clients) ---
      # PUBLIC_DATABASE_PROXY: ${PUBLIC_DATABASE_PROXY:-}

      # --- Mail (deprecated — configure via Admin Panel > Settings instead) ---
      BACKEND_MAIL_HOST: ${SMTP_HOST:-}
      BACKEND_MAIL_PORT: "${SMTP_PORT:-587}"
      BACKEND_MAIL_AUTH_USER: ${SMTP_USERNAME:-}
      BACKEND_MAIL_AUTH_PASS: ${SMTP_PASSWORD:-}

      TZ: ${TZ:-UTC}

    volumes:
      - teable-data:/app/.assets

    networks:
      # Internal: reaches postgres, redis, minio
      - rag-internal
      # Frontend: exposed via Nginx Proxy Manager
      - rag-frontend

    # No external port mapping — access via rag-frontend + NPM only
    # WebUI: http://teable:3000

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:3000/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

    cpus: ${TEABLE_CPU_LIMIT:-1}
    mem_limit: ${TEABLE_MEM_LIMIT:-1024m}
